name: CD - Deploy Backend Services to AKS

on:
  # Align to branch strategy i.e. push to main
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - '.github/workflows/backend-cd.yml'
      - '.github/workflows/deploy_aks.yml'
  # Retain manual fallback for emergency
  workflow_dispatch:
    inputs:
      aks_cluster_name:
        description: 'Name of the AKS Cluster to deploy to'
        required: true
        default: 'week08aks' #updated placeholder
      aks_resource_group:
        description: 'Resource Group of the AKS Cluster'
        required: true
        default: 'deakinuni' #updated placeholder
      aks_acr_name:
        description: 'Name of ACR'
        required: true
        default: 'sit722registry' #updated placeholder

# Add permissions
permissions:
  contents: read
  id-token: write

jobs:
  deploy_backend:
    uses: ./.github/workflows/deploy_aks.yml
    secrets: inherit
    with:
      aks_cluster_name:   ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aks_cluster_name || vars.AKS_CLUSTER_NAME }}
      aks_resource_group: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aks_resource_group || vars.AKS_RESOURCE_GROUP }}
      script: |
        ACR_ID=$(az acr show -n ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aks_acr_name || vars.AKS_ACR_NAME }} --query id -o tsv)
        # Attach ACR (works for push-to-main or manual)
        az aks update \
          --name ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aks_cluster_name || vars.AKS_CLUSTER_NAME }} \
          --resource-group ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.aks_resource_group || vars.AKS_RESOURCE_GROUP }} \
          --attach-acr "$ACR_ID"   

        echo "Deploying backend infrastructure..."
        cd k8s/
        kubectl apply -f configmaps.yaml
        kubectl apply -f secrets.yaml
        kubectl apply -f product-db.yaml
        kubectl apply -f order-db.yaml

        echo "Deploying backend microservices..."
        kubectl apply -f product-service.yaml
        kubectl apply -f order-service.yaml

        echo "Waiting for Product, Order LoadBalancer IPs..."
        PRODUCT_IP=""
        ORDER_IP=""
        for i in $(seq 1 60); do
          PRODUCT_IP=$(kubectl get service product-service-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          ORDER_IP=$(kubectl get service order-service-w08e1 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [[ -n "$PRODUCT_IP" && -n "$ORDER_IP" ]]; then
            echo "::notice::Product Service IP=$PRODUCT_IP"
            echo "::notice::Order Service IP=$ORDER_IP"
            break
          fi
          sleep 5
        done

        if [[ -z "$PRODUCT_IP" || -z "$ORDER_IP" ]]; then
          echo "Error: One or more LoadBalancer IPs not assigned after timeout."
          exit 1
        fi
          
        # These are environment variables for subsequent steps in the *same job*
        # And used to set the job outputs
        echo "PRODUCT_IP=$PRODUCT_IP" >> $GITHUB_ENV
        echo "ORDER_IP=$ORDER_IP" >> $GITHUB_ENV